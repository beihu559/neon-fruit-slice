<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>霓虹切水果</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a12;
      touch-action: none;
      user-select: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
(function () {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ─── Game state ───
  const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
  const MODES = [
    { id: 'speed30', label: '30 秒极速', duration: 30, spawnScale: 0.72, missPenalty: false },
    { id: 'classic60', label: '60 秒经典', duration: 60, spawnScale: 1, missPenalty: false },
    { id: 'penalty60', label: '60 秒掉果扣分', duration: 60, spawnScale: 1, missPenalty: true, missDeduct: 5 },
  ];
  let state = STATE.MENU;
  let currentMode = null;
  let score = 0;
  let lives = 3;
  let scoreFlash = 0;
  let gameDuration = 60;
  let spawnScale = 1;
  let timeLeft = 60;
  let lastTime = 0;
  let spawnTimer = 0;
  let spawnInterval = 0.9;

  const fruits = [];
  const particles = [];
  const bladeTrail = [];
  const MAX_TRAIL = 28;
  const bladeHistory = []; // 触控板轻滑：记录近期轨迹
  const MAX_HISTORY = 12;

  const FRUIT_TYPES = [
    { name: 'apple', color: '#ff3366', glow: '#ff0066', points: 10 },
    { name: 'orange', color: '#ff9933', glow: '#ff6600', points: 15 },
    { name: 'lemon', color: '#ffee33', glow: '#ffcc00', points: 12 },
    { name: 'watermelon', color: '#33ff66', glow: '#00ff44', points: 20 },
    { name: 'grape', color: '#cc66ff', glow: '#9933ff', points: 18 },
  ];

  // ─── Input（触控板友好：无需按住，轻滑即可切）───
  let lastPointer = { x: -999, y: -999 };
  let pointerOnCanvas = false;

  function getPointer(e) {
    if (e.touches && e.touches.length) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function addBladePoint(p, fromSlice) {
    bladeTrail.push({ x: p.x, y: p.y, life: 1 });
    if (bladeTrail.length > MAX_TRAIL) bladeTrail.shift();
    bladeHistory.push({ x: p.x, y: p.y });
    if (bladeHistory.length > MAX_HISTORY) bladeHistory.shift();
    if (fromSlice && bladeHistory.length >= 2) {
      const a = bladeHistory[bladeHistory.length - 2];
      const b = bladeHistory[bladeHistory.length - 1];
      checkSlice(a, b);
    }
  }

  function onMouseEnter(e) {
    pointerOnCanvas = true;
    lastPointer = { x: e.clientX, y: e.clientY };
  }

  function onMouseLeave() {
    pointerOnCanvas = false;
    bladeHistory.length = 0;
  }

  // 鼠标/触控板：移动即出刀，不用按住
  function onMouseMove(e) {
    if (state !== STATE.PLAYING || !pointerOnCanvas) return;
    const p = { x: e.clientX, y: e.clientY };
    if (lastPointer.x < -900) {
      lastPointer = p;
      return;
    }
    const dist = Math.hypot(p.x - lastPointer.x, p.y - lastPointer.y);
    if (dist < 1.5) return;
    addBladePoint(p, true);
    lastPointer = p;
  }

  function onTouchStart(e) {
    if (state !== STATE.PLAYING) return;
    e.preventDefault();
    const p = getPointer(e);
    lastPointer = p;
    bladeHistory.length = 0;
    addBladePoint(p, false);
  }

  function onTouchMove(e) {
    if (state !== STATE.PLAYING) return;
    e.preventDefault();
    const p = getPointer(e);
    const dist = Math.hypot(p.x - lastPointer.x, p.y - lastPointer.y);
    if (dist < 2) return;
    addBladePoint(p, true);
    lastPointer = p;
  }

  canvas.addEventListener('mouseenter', onMouseEnter);
  canvas.addEventListener('mouseleave', onMouseLeave);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });

  // ─── Fruit ───
  function spawnFruit() {
    const side = Math.random() < 0.5 ? 0 : 1;
    const x = side === 0 ? W * 0.15 : W * 0.85;
    const vx = (W * 0.5 - x) * 0.003 + (Math.random() - 0.5) * 2;
    const vy = -(H * 0.018 + Math.random() * H * 0.006);
    const isBomb = Math.random() < 0.12;
    const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
    const r = isBomb ? 34 : 22 + Math.random() * 10;

    fruits.push({
      x, y: H + r,
      vx, vy,
      r,
      type,
      isBomb,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: isBomb ? 0.06 : (Math.random() - 0.5) * 0.12,
      sliced: false,
      gravity: 0.35,
      pulsePhase: Math.random() * Math.PI * 2,
    });
  }

  function updateFruit(f) {
    f.vy += f.gravity;
    f.x += f.vx;
    f.y += f.vy;
    f.rotation += f.rotSpeed;
    if (f.isBomb) f.pulsePhase += 0.12;
    return f.y < H + f.r * 2;
  }

  function onFruitMissed(f) {
    if (!currentMode || !currentMode.missPenalty) return;
    if (f.isHalf || f.isBomb || f.sliced) return;
    const deduct = currentMode.missDeduct || 5;
    score = Math.max(0, score - deduct);
    scoreFlash = 0.6;
    spawnExplosion(Math.min(Math.max(f.x, 40), W - 40), H - 30, '#ff3366', 12);
  }

  function drawBomb(f) {
    const pulse = 0.5 + Math.sin(f.pulsePhase) * 0.5;
    const warnR = f.r + 10 + pulse * 8;

    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rotation);

    // 外层脉冲警示环
    ctx.shadowColor = '#ff0044';
    ctx.shadowBlur = 30 + pulse * 20;
    ctx.strokeStyle = `rgba(255, 50, 50, ${0.4 + pulse * 0.5})`;
    ctx.lineWidth = 3 + pulse * 2;
    ctx.beginPath();
    ctx.arc(0, 0, warnR, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = `rgba(255, 200, 0, ${0.3 + pulse * 0.4})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, warnR + 6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 引线
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, -f.r);
    ctx.lineTo(0, -f.r - 14);
    ctx.stroke();
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(0, -f.r - 16, 5 + pulse * 3, 0, Math.PI * 2);
    ctx.fill();

    // 黑色弹体 + 黄黑警示条纹
    ctx.fillStyle = '#1a0a0a';
    ctx.shadowColor = '#ff0044';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(0, 0, f.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, f.r, 0, Math.PI * 2);
    ctx.clip();
    for (let i = -f.r; i < f.r; i += 10) {
      ctx.fillStyle = (Math.floor(i / 10) % 2 === 0) ? '#ffcc00' : '#1a0a0a';
      ctx.fillRect(i, -f.r, 10, f.r * 2);
    }
    ctx.restore();

    // 红色 X 标记
    ctx.strokeStyle = '#ff2244';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#ff0044';
    ctx.shadowBlur = 15;
    const s = f.r * 0.45;
    ctx.beginPath();
    ctx.moveTo(-s, -s);
    ctx.lineTo(s, s);
    ctx.moveTo(s, -s);
    ctx.lineTo(-s, s);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 「炸弹」标签
    ctx.font = `bold ${14}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff2244';
    ctx.shadowColor = '#ff0044';
    ctx.shadowBlur = 12;
    ctx.fillText('炸弹', 0, f.r + 18);
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  function drawFruit(f) {
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.rotation);

  if (f.isBomb) {
    ctx.restore();
    drawBomb(f);
    return;
  } else {
    const g = ctx.createRadialGradient(-f.r * 0.3, -f.r * 0.3, 0, 0, 0, f.r);
    g.addColorStop(0, f.type.color);
    g.addColorStop(0.7, f.type.color);
    g.addColorStop(1, '#1a1a2e');
    ctx.shadowColor = f.type.glow;
    ctx.shadowBlur = 20;
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, 0, f.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = f.type.glow;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(-f.r * 0.25, -f.r * 0.25, f.r * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  }

  // ─── Slice detection ───
  function lineCircleIntersect(x1, y1, x2, y2, cx, cy, r) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx * dx + dy * dy;
    if (len2 < 1) {
      const d = Math.hypot(cx - x1, cy - y1);
      return d < r;
    }
    const t = Math.max(0, Math.min(1, ((cx - x1) * dx + (cy - y1) * dy) / len2));
    const px = x1 + t * dx, py = y1 + t * dy;
    return Math.hypot(cx - px, cy - py) < r;
  }

  function checkSlice(from, to) {
    if (state !== STATE.PLAYING) return;
    for (let i = fruits.length - 1; i >= 0; i--) {
      const f = fruits[i];
      if (f.sliced) continue;
      if (lineCircleIntersect(from.x, from.y, to.x, to.y, f.x, f.y, f.r)) {
        sliceFruit(f, i);
      }
    }
  }

  function sliceFruit(f, index) {
    f.sliced = true;
    fruits.splice(index, 1);

    if (f.isBomb) {
      lives--;
      spawnExplosion(f.x, f.y, '#ff0044', 40);
      if (lives <= 0) gameOver();
      return;
    }

    score += f.type.points;
    spawnExplosion(f.x, f.y, f.type.glow, 25);
    spawnJuiceHalves(f);
  }

  function spawnJuiceHalves(f) {
    for (let side = -1; side <= 1; side += 2) {
      fruits.push({
        x: f.x, y: f.y,
        vx: f.vx + side * 3,
        vy: f.vy - 2,
        r: f.r * 0.7,
        type: f.type,
        isBomb: false,
        rotation: f.rotation,
        rotSpeed: side * 0.15,
        sliced: true,
        gravity: 0.4,
        isHalf: true,
        halfSide: side,
      });
    }
  }

  // ─── Particles ───
  function spawnExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        color,
        size: 2 + Math.random() * 5,
      });
    }
  }

  function updateParticle(p) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.vx *= 0.98;
    p.life -= p.decay;
    return p.life > 0;
  }

  function drawParticle(p) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ─── Blade trail ───
  function updateBladeTrail() {
    for (let i = bladeTrail.length - 1; i >= 0; i--) {
      bladeTrail[i].life -= 0.045;
      if (bladeTrail[i].life <= 0) bladeTrail.splice(i, 1);
    }
  }

  function drawBlade() {
    if (bladeTrail.length < 2) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    for (let i = 1; i < bladeTrail.length; i++) {
      const a = bladeTrail[i - 1];
      const b = bladeTrail[i];
      const alpha = Math.min(a.life, b.life);
      const width = 4 + alpha * 14;

      const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
      grad.addColorStop(0, `rgba(0, 255, 255, ${alpha * 0.3})`);
      grad.addColorStop(0.5, `rgba(255, 0, 255, ${alpha * 0.8})`);
      grad.addColorStop(1, `rgba(0, 255, 200, ${alpha * 0.3})`);

      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = grad;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ─── Background ───
  function drawBackground() {
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#0a0a18');
    bg.addColorStop(0.5, '#12102a');
    bg.addColorStop(1, '#0d0820');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // grid glow
    ctx.strokeStyle = 'rgba(0, 255, 255, 0.03)';
    ctx.lineWidth = 1;
    const gridSize = 60;
    for (let x = 0; x < W; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
  }

  // ─── HUD ───
  function drawHUD() {
    ctx.save();
    ctx.font = 'bold 22px "Segoe UI", sans-serif';
    ctx.textBaseline = 'top';

    // Score
    const scoreColor = scoreFlash > 0 ? '#ff3366' : '#00ffff';
    ctx.shadowColor = scoreColor;
    ctx.shadowBlur = scoreFlash > 0 ? 18 : 10;
    ctx.fillStyle = scoreColor;
    ctx.textAlign = 'left';
    ctx.fillText(`得分 ${score}`, 20, 20);

    // Timer
    ctx.textAlign = 'center';
    const warnThreshold = gameDuration <= 30 ? 5 : 10;
    const timerColor = timeLeft <= warnThreshold ? '#ff3366' : '#ff00ff';
    ctx.shadowColor = timerColor;
    ctx.fillStyle = timerColor;
    ctx.fillText(`${Math.ceil(timeLeft)}s`, W / 2, 20);
    ctx.font = '12px "Segoe UI", sans-serif';
    ctx.fillStyle = 'rgba(255, 0, 255, 0.6)';
    const modeTag = currentMode?.id === 'speed30' ? '极速'
      : currentMode?.missPenalty ? '掉果扣分' : '经典';
    ctx.fillText(modeTag, W / 2, 44);

    // Lives
    ctx.textAlign = 'right';
    ctx.shadowColor = '#ff3366';
    ctx.fillStyle = '#ff3366';
    let hearts = '';
    for (let i = 0; i < lives; i++) hearts += '♥ ';
    ctx.fillText(hearts.trim(), W - 20, 20);

    // 操作提示
    ctx.shadowBlur = 6;
    ctx.font = '13px "Segoe UI", sans-serif';
    ctx.fillStyle = 'rgba(0, 255, 255, 0.45)';
    ctx.textAlign = 'center';
    const hint = currentMode?.missPenalty
      ? '漏切水果扣 5 分(最低 0) · 避开炸弹'
      : '触控板轻滑即可切水果 · 避开黄黑条纹炸弹';
    ctx.fillText(hint, W / 2, H - 24);

    ctx.restore();
  }

  function getModeButtons(offsetY) {
    const bw = Math.min(240, W * 0.44);
    const bh = 44;
    const gap = 10;
    const totalH = MODES.length * bh + (MODES.length - 1) * gap;
    const startY = offsetY - totalH / 2;
    return MODES.map((mode, i) => ({
      mode,
      x: W / 2 - bw / 2,
      y: startY + i * (bh + gap),
      w: bw,
      h: bh,
    }));
  }

  function hitButton(x, y, btn) {
    return x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h;
  }

  function getModeAt(x, y, offsetY) {
    for (const btn of getModeButtons(offsetY)) {
      if (hitButton(x, y, btn)) return btn.mode;
    }
    return null;
  }

  function drawModeButtons(offsetY, highlightModeId) {
    const buttons = getModeButtons(offsetY);
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 17px "Segoe UI", sans-serif';

    for (const btn of buttons) {
      const active = highlightModeId && highlightModeId === btn.mode.id;
      const pulse = 0.85 + Math.sin(Date.now() / 400) * 0.15;

      ctx.shadowColor = active ? '#00ffff' : '#ff00ff';
      ctx.shadowBlur = active ? 22 : 12;
      ctx.strokeStyle = active ? '#00ffff' : `rgba(255, 0, 255, ${pulse})`;
      ctx.lineWidth = active ? 3 : 2;
      ctx.fillStyle = active ? 'rgba(0, 255, 255, 0.15)' : 'rgba(255, 0, 255, 0.08)';
      const r = 10;
      ctx.beginPath();
      ctx.moveTo(btn.x + r, btn.y);
      ctx.lineTo(btn.x + btn.w - r, btn.y);
      ctx.quadraticCurveTo(btn.x + btn.w, btn.y, btn.x + btn.w, btn.y + r);
      ctx.lineTo(btn.x + btn.w, btn.y + btn.h - r);
      ctx.quadraticCurveTo(btn.x + btn.w, btn.y + btn.h, btn.x + btn.w - r, btn.y + btn.h);
      ctx.lineTo(btn.x + r, btn.y + btn.h);
      ctx.quadraticCurveTo(btn.x, btn.y + btn.h, btn.x, btn.y + btn.h - r);
      ctx.lineTo(btn.x, btn.y + r);
      ctx.quadraticCurveTo(btn.x, btn.y, btn.x + r, btn.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.shadowBlur = 8;
      ctx.fillStyle = active ? '#00ffff' : '#ff66ff';
      ctx.fillText(btn.mode.label, btn.x + btn.w / 2, btn.y + btn.h / 2);
    }
    ctx.restore();
  }

  function drawOverlayScreen(title, subtitle, buttonOffsetY, highlightModeId) {
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.shadowColor = '#ff00ff';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ff00ff';
    ctx.font = 'bold 44px "Segoe UI", sans-serif';
    ctx.fillText(title, W / 2, H / 2 - 100);

    if (subtitle) {
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#00ffff';
      ctx.font = '22px "Segoe UI", sans-serif';
      ctx.fillText(subtitle, W / 2, H / 2 - 50);
    }

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.font = '15px "Segoe UI", sans-serif';
    ctx.fillText('选择模式开始', W / 2, buttonOffsetY - 50);

    drawModeButtons(buttonOffsetY, highlightModeId);
    ctx.restore();
  }

  function drawMenu() {
    drawBackground();
    drawOverlayScreen('霓虹切水果', null, H / 2 + 50, null);
  }

  function drawGameOver() {
    drawOverlayScreen('GAME OVER', `最终得分: ${score}`, H / 2 + 55, currentMode?.id);
  }

  function gameOver() {
    state = STATE.GAMEOVER;
  }

  function startGame(mode) {
    currentMode = mode;
    gameDuration = mode.duration;
    spawnScale = mode.spawnScale;
    state = STATE.PLAYING;
    score = 0;
    lives = 3;
    scoreFlash = 0;
    timeLeft = gameDuration;
    spawnTimer = 0;
    spawnInterval = 0.9 * spawnScale;
    fruits.length = 0;
    particles.length = 0;
    bladeTrail.length = 0;
    bladeHistory.length = 0;
    lastTime = performance.now();
  }

  function onModeSelect(e) {
    if (state !== STATE.MENU && state !== STATE.GAMEOVER) return;
    e.preventDefault();
    const p = getPointer(e);
    const offsetY = state === STATE.MENU ? H / 2 + 50 : H / 2 + 55;
    const mode = getModeAt(p.x, p.y, offsetY);
    if (mode) startGame(mode);
  }

  canvas.addEventListener('mousedown', onModeSelect);
  canvas.addEventListener('touchstart', onModeSelect, { passive: false });

  // ─── Main loop ───
  function update(dt) {
    if (state !== STATE.PLAYING) return;

    timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      gameOver();
      return;
    }

    spawnTimer += dt;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnFruit();
      spawnInterval = (0.6 + Math.random() * 0.6) * spawnScale;
    }

    for (let i = fruits.length - 1; i >= 0; i--) {
      if (!updateFruit(fruits[i])) {
        onFruitMissed(fruits[i]);
        fruits.splice(i, 1);
      }
    }

    if (scoreFlash > 0) scoreFlash -= dt;

    for (let i = particles.length - 1; i >= 0; i--) {
      if (!updateParticle(particles[i])) particles.splice(i, 1);
    }

    updateBladeTrail();
  }

  function draw() {
    drawBackground();

    for (const f of fruits) {
      if (f.isHalf) {
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rotation);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        if (f.halfSide < 0) {
          ctx.arc(0, 0, f.r, Math.PI * 0.5, Math.PI * 1.5);
        } else {
          ctx.arc(0, 0, f.r, -Math.PI * 0.5, Math.PI * 0.5);
        }
        ctx.closePath();
        ctx.fillStyle = f.type.color;
        ctx.shadowColor = f.type.glow;
        ctx.shadowBlur = 15;
        ctx.fill();
        ctx.restore();
      } else {
        drawFruit(f);
      }
    }

    for (const p of particles) drawParticle(p);
    drawBlade();
    drawHUD();

    if (state === STATE.MENU) drawMenu();
    if (state === STATE.GAMEOVER) drawGameOver();
  }

  function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  lastTime = performance.now();
  requestAnimationFrame(loop);
})();
  </script>
</body>
</html>
